name: action

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          path: fragments-portal
          token: ${{ secrets.PAT }}
      
      - uses: actions/checkout@v4
        with: 
          repository: freeze-dolphin/fragments-category
          path: fragments-category
          ref: master
          token: ${{ secrets.CATEGORY_TOKEN }}

      - name: Setup Temurin JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup dotnet 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Generate arcpkgs and upload to S3
        env:
          S3_API: ${{ secrets.S3_API }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          dotnet fsi fragments-portal/upload_artifacts.fsx

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Generate Page Content
        run: |
          dotnet fsi fragments-portal/make_songdoc.fsx

      - name: Upload Page Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'songdoc'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
